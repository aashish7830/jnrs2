<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maple Resort Booking Section</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Tenor+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .booking-section {
            display: flex;
            align-items: center; /* Form ko vertically center karne ke liye */
            justify-content: space-between;
            min-height: 100vh; /* Pure screen ki height */
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            /* Pure screen par background image */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1618773928121-c32242e63f39?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Image scroll nahi hogi */
            padding: 0 8%; /* Side margins for the whole content */
        }

        /* Left Side - Text Content */
        .booking-left {
            flex: 1;
            color: #fff;
            padding-right: 50px;
        }

        .booking-left h2 {
            font-family: 'Tenor Sans', sans-serif;
            font-size: 42px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .reservation-box {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1); /* Glass effect background */
            padding: 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            width: fit-content;
        }

        .res-icon {
            font-size: 35px;
            color: #fff;
        }

        .res-text span {
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .res-numbers {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.5;
        }

        /* Right Side - Floating Form Box */
        .booking-right {
            width: 450px; /* Form ki fix width chota karne ke liye */
            background-color: #f6f5f0; 
            padding: 50px 40px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-right: 20px; /* Right side se margin */
        }

        .form-header span {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 12px;
            color: #777;
            display: block;
            margin-bottom: 8px;
        }

        .form-header h3 {
            font-family: 'Tenor Sans', sans-serif;
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 35px;
        }

        .booking-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-group {
            position: relative;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 2px;
        }

        /* Last select box (1 Room) ko full width karne ke liye */
        .input-group:nth-last-child(2) {
            grid-column: span 1; 
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            background: transparent;
            color: #333;
        }

        .input-group i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 14px;
            pointer-events: none;
        }

        .check-btn {
            grid-column: span 2;
            background-color: #1a2a20; 
            color: #fff;
            border: none;
            padding: 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .check-btn:hover {
            background-color: #263d2e;
            transform: translateY(-2px);
        }

        /* Mobile View */
        @media (max-width: 992px) {
            .booking-section { 
                flex-direction: column; 
                padding: 60px 20px;
                justify-content: center;
            }
            .booking-left { 
                padding-right: 0; 
                margin-bottom: 40px; 
                text-align: center;
            }
            .reservation-box { margin: 0 auto; }
            .booking-right { 
                width: 100%; 
                margin-right: 0; 
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body>

    <section class="booking-section">
        <div class="booking-left">
            <h2>Plan Your Escape</h2>
            
            <div class="reservation-box">
                <div class="res-icon"><i class="fa-solid fa-phone-volume"></i></div>
                <div class="res-text">
                    <span>Reservation</span>
                    <div class="res-numbers">
                        +91 9811260626, +91 9811260626<br>
                        +91 9418336377, 01792-292900
                    </div>
                </div>
            </div>
        </div>

        <div class="booking-right">
            <div class="form-header">
                <span>Rooms & Suites</span>
                <h3>Hotel Booking Form</h3>
            </div>

            <form class="booking-form">
                <div class="input-group">
                    <input type="text" placeholder="Name" required>
                    <i class="fa-regular fa-user"></i>
                </div>
                
                <div class="input-group">
                    <input type="tel" placeholder="Phone" required>
                    <i class="fa-solid fa-mobile-screen-button"></i>
                </div>

                <div class="input-group">
                    <input type="text" onfocus="(this.type='date')" onblur="(this.type='text')" placeholder="Check in">
                    <i class="fa-regular fa-calendar-days"></i>
                </div>

                <div class="input-group">
                    <input type="text" onfocus="(this.type='date')" onblur="(this.type='text')" placeholder="Check out">
                    <i class="fa-regular fa-calendar-days"></i>
                </div>

                <div class="input-group">
                    <select>
                        <option value="" disabled selected>Adults</option>
                        <option>1 Adult</option>
                        <option>2 Adults</option>
                        <option>3 Adults</option>
                    </select>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>

                <div class="input-group">
                    <select>
                        <option value="" disabled selected>Children</option>
                        <option>None</option>
                        <option>1 Child</option>
                        <option>2 Children</option>
                    </select>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>

                <div class="input-group">
                    <select>
                        <option>1 Room</option>
                        <option>2 Rooms</option>
                        <option>3 Rooms</option>
                    </select>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>

                <button type="submit" class="check-btn">CHECK AVAILABILITY</button>
            </form>
        </div>
    </section>

</body>
</html>
